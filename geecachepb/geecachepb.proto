// 说明我们使用的是第 3 版的 protobuf 语法
syntax = "proto3";

// 给这份契约起个包名
package geecachepb;

// 🌟 这一行极度重要！告诉编译器：生成的 Go 代码放在哪个相对目录下，包名叫什么
option go_package = "mony-cache_final/geecachepb";

// 1. 定义请求结构体（类似 Go 的 struct）
message GetRequest {
  // 注意：这里的 = 1, = 2 不是赋值！而是给字段贴上“位置标签”。
  // 压缩数据时，它只传标签号 1 和 2，不传变量名，所以体积极小！
  string group = 1;
  string key = 2;
}

// 2. 定义响应结构体
message GetResponse {
  // bytes 对应 Go 里面的 []byte
  bytes value = 1;
}

// 3. 定义服务接口（类似 Go 的 interface）
// 意思是：我提供一个叫 GroupCache 的服务，里面有个 Get 方法。
service GroupCache {
  rpc Get(GetRequest) returns (GetResponse);
}