syntax = "proto3";

// 给这份契约起个包名
package geecachepb;

// 告诉编译器生成的 Go 代码放在哪个包下
option go_package = "mony-cache_final/geecachepb";

// ================= 1. Get (读操作) =================
message GetRequest {
    string group = 1;
    string key = 2;
}

message GetResponse {
    bytes value = 1;
}

// ================= 2. Set (写操作) =================
message SetRequest {
    string group = 1;
    string key = 2;
    bytes value = 3;     // 要写入的数据
    int64 ttl = 4;       // 过期时间（可选，单位可以是秒或毫秒，这里用 int64）
}

message SetResponse {
    bool success = 1;    // 是否写入成功
    string message = 2;  // 附加信息（比如报错时的错误信息）
}

// ================= 3. Delete (删操作) =================
message DeleteRequest {
    string group = 1;
    string key = 2;
}

message DeleteResponse {
    bool success = 1;    // 是否删除成功
}

// ================= 4. 定义服务接口 =================
service GroupCache {
    // 读数据
    rpc Get(GetRequest) returns (GetResponse);
    
    // 写数据
    rpc Set(SetRequest) returns (SetResponse);
    
    //删数据
    rpc Delete(DeleteRequest) returns (DeleteResponse);
}